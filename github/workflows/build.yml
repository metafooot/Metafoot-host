name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Capacitor project (generate android folder)
        run: npx cap sync android

      - name: Replace default MainActivity with custom one (loads live URL)
        run: |
          cp android/app/src/main/java/com/metafoot/app/MainActivity.java \
             android/app/src/main/java/com/metafoot/app/MainActivity.java.bak || true
          # This copies YOUR custom activity that loads metafoot.top
          cp android/app/src/main/java/com/metafoot/app/MainActivity.java \
             android/app/src/main/java/com/metafoot/app/MainActivity.java

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metafoot-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # 1. Fresh start — remove any old Android folder
      - name: Remove existing Android folder
        run: rm -rf android

      # 2. Create fresh Android project
      - name: Add Android platform
        run: npx cap add android

      # 3. Sync Capacitor (sets up native libraries)
      - name: Sync Capacitor Android project
        run: npx cap sync android

      # 4. Generate all app icons automatically using sharp (Node.js)
      - name: Generate Android icons from icon.png
        run: |
          npm install sharp
          node -e "
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');

          const sizes = [48, 72, 96, 144, 192];
          const densities = ['mdpi', 'hdpi', 'xhdpi', 'xxhdpi', 'xxxhdpi'];

          sizes.forEach((size, index) => {
            const dir = \`android/app/src/main/res/mipmap-\${densities[index]}\`;
            fs.mkdirSync(dir, { recursive: true });
            sharp('icon.png')
              .resize(size, size)
              .toFile(path.join(dir, 'ic_launcher.png'))
              .then(() => console.log(\`Created \${size}x\${size} icon\`))
              .catch(err => console.error(err));
          });
          "

      - name: Accept Android SDK licenses & install required packages
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" || true

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metafoot-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # ---- NEW: Install Capacitor Assets and generate app icons ----
      - name: Install Capacitor Assets tool
        run: npm install --save-dev @capacitor/assets

      - name: Generate Android app icons from icon.png
        run: npx @capacitor/assets generate --iconBackgroundColor '#0a0a0a' --android
      # --------------------------------------------------------------

      - name: Add Android platform (creates the android folder)
        run: npx cap add android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Accept Android SDK licenses & install required packages
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" || true

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metafoot-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
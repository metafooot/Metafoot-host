    function userKey(baseKey) {
        if (!baseKey) return baseKey;
        if (baseKey === ACTIVE_MINERS_KEY || baseKey === TOTAL_DISTRIBUTED_KEY || baseKey === REFERRALS_KEY) return baseKey;
        return currentAccountId ? `${currentAccountId}_${baseKey}` : baseKey;

    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    function playGamepadSound() {
        if (!audioCtx) initAudio(); if (!audioCtx) return;
        if (audioCtx.state==='suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type='sine'; osc.frequency.value=880;
        gain.gain.setValueAtTime(1.0,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.1);
        osc.start(now); osc.stop(now+0.08);
    }

    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
        } else {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                return true;
            } catch (e) { return false; }
            finally { document.body.removeChild(textarea); }
        }
    }

    function sha256hex(data) { return CryptoJS.SHA256(data).toString(CryptoJS.enc.Hex); }
    function secureRandomHex12() {
        if (window.crypto && window.crypto.getRandomValues) {
            const arr = new Uint8Array(6); window.crypto.getRandomValues(arr);
            return Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
        } else {
            return Math.random().toString(16).substring(2,14).padEnd(12,'0');
        }
    }

    function generateSeedphrase() {
        const entropy = new Uint8Array(16); if (window.crypto && window.crypto.getRandomValues) window.crypto.getRandomValues(entropy);
        let bits = ''; for(let i=0;i<entropy.length;i++) bits += entropy[i].toString(2).padStart(8,'0');
        const words = []; for(let i=0;i<12;i++) words.push(wordlist[parseInt(bits.substr(i*11,11),2)]);
        return words.join(' ');
    }

    function normalizeSeedphrase(phrase) { return phrase.replace(/[\u200B-\u200D\uFEFF]/g,'').trim().replace(/\s+/g,' ').toLowerCase().trim(); }
    function deriveAccountId(seedphrase) { return sha256hex(normalizeSeedphrase(seedphrase)).substring(0,12); }
    function derivePlayerPublicId(accountId) { return sha256hex(accountId + "metafoot_player_salt").substring(0,12); }

    async function saveUserToCloud() {
        if (!currentAccountId) return;
        try {
            const backup = {
                balance: getUserBalance(),
                attributes: getStorage('player_training_attrs') ? JSON.parse(getStorage('player_training_attrs')) : {},
                username: getStorage('profile_username') || '',
                lastClaim: getStorage(LAST_CLAIM_KEY),
                referrals: getReferralList().filter(r => r.referrer === currentReferralCode || r.referred === currentReferralCode),
                referralCode: currentReferralCode
            };
            await fetch(`${API_BASE}/save-user`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ accountId:currentAccountId, userData:backup }) });
        } catch(e) { console.warn('Cloud save failed', e); }
    }

    async function loadUserFromCloud() {
        if (!currentAccountId) return null;
        try {
            const res = await fetch(`${API_BASE}/load-user?accountId=${currentAccountId}`);
            return await res.json();
        } catch(e) { return null; }
    }

    async function registerMinerGlobally(accountId) {
        try {
            const res = await fetch(`${API_BASE}/register-miner`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ accountId }) });
            const result = await res.json();
            localStorage.setItem(ACTIVE_MINERS_KEY, result.totalMiners);
            updateMiningStats();
        } catch(e) { updateMiningStats(); }
    }

    async function refreshGlobalStats() {
        try {
            const [minersRes, distRes] = await Promise.all([
                fetch(`${API_BASE}/total-miners`),
                fetch(`${API_BASE}/total-distributed`)
            ]);
            localStorage.setItem(ACTIVE_MINERS_KEY, (await minersRes.json()).totalMiners);
            localStorage.setItem(TOTAL_DISTRIBUTED_KEY, (await distRes.json()).totalDistributed);
        } catch(e) {}
        updateMiningStats();
    }

    async function claimReward() {
        if (!currentAccountId) return;
        try {
            const res = await fetch(`${API_BASE}/claim`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ accountId:currentAccountId }) });
            const result = await res.json();
            if (result.error) {
                if (result.error === 'Already claimed today') {
                    showModal('Already claimed', `You can claim again in ${formatTime(result.remainingMs)}.`);
                } else showModal('Claim failed', result.error);
                return;
            }
            addToUserBalance(result.reward);
            setStorage(LAST_CLAIM_KEY, Date.now().toString());
            updateMiningStats();
            canvasConfetti({ particleCount:120, spread:70, origin:{y:0.6}, colors:['#ff3333','#ff8888'] });
            showModal('Claimed', `🎉 You claimed ${result.reward} $FOOT!`);
            playGamepadSound();
            updateCircularTimer();
            saveUserToCloud();
        } catch(e) { showModal('Server asleep','The server is waking up. Please wait a few seconds and try again.'); }
    }

    function formatTime(ms) {
        const h = Math.floor(ms/3600000);
        const m = Math.floor((ms%3600000)/60000);
        const s = Math.floor((ms%60000)/1000);
        return `${h}h ${m}m ${s}s`;
    }

    async function createWallet() {
        const seedphrase = generateSeedphrase();
        const accountId = deriveAccountId(seedphrase);
        const referralCode = secureRandomHex12();
        localStorage.setItem(ENCRYPTED_SEED_KEY, seedphrase);
        setStorage(REF_CODE_V2_KEY, referralCode);
        currentSeedphrase = seedphrase;
        currentAccountId = accountId;
        currentReferralCode = referralCode;
        currentPlayerPublicId = derivePlayerPublicId(accountId);
        await registerMinerGlobally(accountId);
        return { accountId, seedphrase, referralCode };
    }

    async function restoreFromBackup(backupText) {
        try {
            const backup = JSON.parse(backupText);
            if (!backup.seedphrase) return { error:'invalid_backup' };
            currentSeedphrase = backup.seedphrase;
            const accountId = deriveAccountId(backup.seedphrase);
            localStorage.setItem(ENCRYPTED_SEED_KEY, backup.seedphrase);
            if (backup.referralCode) setStorage(REF_CODE_V2_KEY, backup.referralCode);
            else setStorage(REF_CODE_V2_KEY, secureRandomHex12());
            currentReferralCode = getStorage(REF_CODE_V2_KEY);
            return { accountId, backup };
        } catch(e) { return { error:'invalid_backup' }; }
    }

    async function refreshReferralInfo() {
        const code = currentReferralCode || getStorage(REF_CODE_V2_KEY);
        if (!code || code.length !== 12) return;
        try {
            const res = await fetch(`${API_BASE}/referral-info?code=${code}`);
            if (!res.ok) return;
            const info = await res.json();
            const friends = info.friends || [];
            const totalEarned = info.totalEarned || 0;
            const localList = friends.map(f => ({ referrer:code, referred:f.referred, timestamp:f.timestamp }));
            localStorage.setItem(REFERRALS_KEY, JSON.stringify(localList));
            const lastCollected = getLastCollectedReferralEarnings();
            if (totalEarned > lastCollected) {
                addToUserBalance(totalEarned - lastCollected);
                setLastCollectedReferralEarnings(totalEarned);
                saveUserToCloud();
            }
            document.getElementById('pendingReferralAmount').innerText = totalEarned.toFixed(2);
            document.getElementById('referralCount').innerText = friends.length;
            const friendsContainer = document.getElementById('friendsListContainer');
            if (friends.length > 0) {
                friendsContainer.innerHTML = '<strong>Invited Friends:</strong><ul class="friends-list">' + friends.map(f => `<li>${f.referred} <small style="color:#888;">(${new Date(f.timestamp).toLocaleDateString()})</small></li>`).join('') + '</ul>';
            } else friendsContainer.innerHTML = '<p style="font-size:0.8rem; color:#888;">No friends invited yet.</p>';
        } catch(e) {}
    }

    async function addReferralOnServer(referrerCode, referredCode) {
        try {
            const res = await fetch(`${API_BASE}/referral-add`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ referrerCode, referredCode }) });
            const result = await res.json();
            if (result.success) {
                const list = getReferralList();
                list.push({ referrer:referrerCode, referred:referredCode, timestamp:Date.now() });
                localStorage.setItem(REFERRALS_KEY, JSON.stringify(list));
                if (currentReferralCode === referredCode) {
                    addToUserBalance(result.reward||getReferralReward());
                    saveUserToCloud();
                }
                refreshReferralInfo();
                updateMiningStats();
            }
            return result;
        } catch(e) { return { error:'Server unreachable' }; }
    }

    function getReferralReward() {
        const miners = getActiveMiners();
        const base = 2;
        if (miners<15000) return base;
        if (miners<100000) return base/2;
        if (miners<500000) return base/4;
        if (miners<1000000) return base/8;
        return base/16;
    }

    function handleReferralSubmit() {
        const friendCode = document.getElementById('friendCodeInput').value.trim();
        const errorEl = document.getElementById('referralError');
        if (!friendCode || friendCode.length!==12 || !/^[a-f0-9]+$/i.test(friendCode)) { errorEl.innerText = 'Invalid referral code.'; return; }
        if (friendCode === currentReferralCode) { errorEl.innerText = 'You cannot refer yourself.'; return; }
        addReferralOnServer(friendCode, currentReferralCode).then(result => {
            if (result.success) {
                errorEl.innerText = '';
                showModal('Connected & Rewarded', `✅ You earned ${(result.reward||getReferralReward()).toFixed(2)} $FOOT instantly! Your friend will also receive ${(result.reward||getReferralReward()).toFixed(2)} $FOOT.`);
                document.getElementById('friendCodeInput').value = '';
            } else errorEl.innerText = result.error || 'Connection failed.';
        }).catch(() => { errorEl.innerText = 'Connection failed.'; });
    }

        const storedRef = sessionStorage.getItem('invite_ref_code');

        if (storedRef === currentReferralCode) { sessionStorage.removeItem('invite_ref_code'); return; }

    // ---------- loadProfile ----------
    function loadProfile() {
        document.getElementById('profileUsername').value = getStorage('profile_username')||'';
        document.getElementById('profileBalance').innerText = getUserBalance().toLocaleString()+' $FOOT';
        const idEl = document.getElementById('profileAccountId');
        idEl.textContent = currentAccountId||'—';
        idEl.classList.add('blurred');
        const refEl = document.getElementById('profileRefCode');
        refEl.textContent = currentReferralCode||getStorage(REF_CODE_V2_KEY)||'—';
        refEl.classList.add('blurred');
    }

    // ---------- Profile buttons event listeners ----------
    let profileIdRevealed = false;
    document.getElementById('revealProfileIdBtn').addEventListener('click', ()=>{
        const idEl = document.getElementById('profileAccountId');
        profileIdRevealed = !profileIdRevealed;
        if (profileIdRevealed) {
            idEl.classList.remove('blurred');
            document.getElementById('revealProfileIdBtn').innerHTML = '<i class="fas fa-eye-slash"></i>';
        } else {
            idEl.classList.add('blurred');
            document.getElementById('revealProfileIdBtn').innerHTML = '<i class="fas fa-eye"></i>';
        }
    });

    document.getElementById('copyProfileIdBtn').addEventListener('click', async ()=>{
        if (!currentAccountId) { showModal('Error', 'No Account ID loaded.'); return; }
        const success = await copyToClipboard(currentAccountId);
        showModal(success ? 'Copied' : 'Manual Copy', success ? 'Account ID copied.' : `Select and copy: <span style="font-family:monospace;">${currentAccountId}</span>`);
    });

    let profileRefRevealed = false;
    document.getElementById('revealProfileRefBtn').addEventListener('click', ()=>{
        const refEl = document.getElementById('profileRefCode');
        profileRefRevealed = !profileRefRevealed;
        if (profileRefRevealed) {
            refEl.classList.remove('blurred');
            document.getElementById('revealProfileRefBtn').innerHTML = '<i class="fas fa-eye-slash"></i>';
        } else {
            refEl.classList.add('blurred');
            document.getElementById('revealProfileRefBtn').innerHTML = '<i class="fas fa-eye"></i>';
        }
    });

    document.getElementById('copyProfileRefBtn').addEventListener('click', async ()=>{
        const code = currentReferralCode || getStorage(REF_CODE_V2_KEY);
        if (!code) { showModal('Error', 'No referral code found.'); return; }
        const success = await copyToClipboard(code);
        showModal(success ? 'Copied' : 'Manual Copy', success ? 'Referral code copied.' : `Select and copy: <span style="font-family:monospace;">${code}</span>`);
    });

    document.getElementById('copySeedBtn').addEventListener('click', async ()=>{
        if (!currentSeedphrase) { showModal('Error', 'Seedphrase not loaded.'); return; }
        const success = await copyToClipboard(currentSeedphrase);
        showModal(success ? 'Copied' : 'Manual Copy', success ? 'Seedphrase copied to clipboard.' : `Select and copy: <span style="font-family:monospace;">${currentSeedphrase}</span>`);
    });

    // ---------- initApp ----------
    function initApp(accountId, backupData = null, preloadedCloudData = null) {
        currentAccountId = accountId;
        currentReferralCode = getStorage(REF_CODE_V2_KEY);
        if (!currentReferralCode) { currentReferralCode = secureRandomHex12(); setStorage(REF_CODE_V2_KEY, currentReferralCode); }
        currentPlayerPublicId = derivePlayerPublicId(accountId);
        if (backupData) {
            if (backupData.balance !== undefined) setUserBalance(backupData.balance);
            if (backupData.attributes) setStorage('player_training_attrs', JSON.stringify(backupData.attributes));
            if (backupData.username) setStorage('profile_username', backupData.username);
            if (backupData.lastClaim) setStorage(LAST_CLAIM_KEY, backupData.lastClaim);
            if (backupData.referrals) {
                const currentRefs = getReferralList();
                backupData.referrals.forEach(r => { if (!currentRefs.some(c=>c.referrer===r.referrer && c.referred===r.referred)) currentRefs.push(r); });
                localStorage.setItem(REFERRALS_KEY, JSON.stringify(currentRefs));
            }
        }
        loadSeedphraseFromStorage();
        registerMinerGlobally(accountId);
        const lastRole = getStorage('last_active_role')||'player';
        setUIRole(lastRole);
        updateMiningStats();
        setUserBalance(getUserBalance());
        const localTimeNow = parseInt(getStorage(LAST_CLAIM_KEY)) || 0;
        if (localTimeNow > 0) updateCircularTimer();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateCircularTimer, 1000);

        const applyCloudData = (cloudData) => {
            if (cloudData) {
                const userData = cloudData.userData || {};
                const localBalance = getUserBalance();
                if (userData.balance !== undefined && userData.balance > localBalance) {
                    setUserBalance(userData.balance);
                }
                if (userData.attributes) setStorage('player_training_attrs', JSON.stringify(userData.attributes));
                if (userData.username) setStorage('profile_username', userData.username);
                if (userData.referralCode) { setStorage(REF_CODE_V2_KEY, userData.referralCode); currentReferralCode = userData.referralCode; }
                updateMiningStats();
                updateReferralUI();
                loadAttributes();
                renderTrainingScreen();
            }
        };

        if (preloadedCloudData) {
            applyCloudData(preloadedCloudData);
        } else {
            loadUserFromCloud().then(applyCloudData);
        }

        refreshReferralInfo();
        setInterval(refreshReferralInfo, 30000);
        updateUpdatesBadge();
        setInterval(updateUpdatesBadge, 60000);
    }

    // Music (unchanged)
    const playlist = [
        { name:"Stadium 1", url:"https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=stadium-crowd-7050.mp3" },
        { name:"Stadium 2", url:"https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8f5b3c2.mp3?filename=stadium-crowd-6069.mp3" }
    ];
    let currentTrack=0, audio=null, playing=false;
    function loadTrack(i){
        if(audio){ audio.pause(); audio.removeEventListener('ended', onTrackEnd); }
        const track = playlist[i%playlist.length];
        audio = new Audio(track.url); audio.volume=0.35; audio.loop=false;
        audio.addEventListener('ended', onTrackEnd);
        audio.load();
        if(playing) audio.play().catch(e=>{});
    }
    function onTrackEnd(){ if(!playing) return; currentTrack=(currentTrack+1)%playlist.length; loadTrack(currentTrack); }
    function startPlaylist(){ if(audio && playing) return; playing=true; if(audio) audio.play().catch(()=>{}); else loadTrack(currentTrack); }
    function stopPlaylist(){ playing=false; if(audio) audio.pause(); }
    const musicBtn = document.getElementById('musicControl');
    const musicIcon = document.getElementById('musicIcon');
    const musicText = document.getElementById('musicText');
    let musicActive = false;
    musicBtn.addEventListener('click', ()=>{
        if(musicActive){ stopPlaylist(); musicIcon.className='fas fa-volume-mute'; musicText.innerText='Play Music'; }
        else { startPlaylist(); musicIcon.className='fas fa-music'; musicText.innerText='Mute'; }
        musicActive=!musicActive;
        playGamepadSound();
    });

    // Profile, backup, seed, etc. (unchanged)
    document.getElementById('exportBackupBtn').addEventListener('click', async ()=>{
        if (!currentAccountId || !currentSeedphrase) { showModal('Error','Wallet not loaded.'); return; }
        const backup = {
            seedphrase: currentSeedphrase,
            balance: getUserBalance(),
            attributes: getStorage('player_training_attrs')?JSON.parse(getStorage('player_training_attrs')):{},
            referrals: getReferralList().filter(r=>r.referrer===currentReferralCode||r.referred===currentReferralCode),
            username: getStorage('profile_username')||'',
            lastClaim: getStorage(LAST_CLAIM_KEY),
            referralCode: currentReferralCode,
            timestamp: Date.now()
        };
        const jsonStr = JSON.stringify(backup);
        const success = await copyToClipboard(jsonStr);
        if (success) showModal('Backup Copied', 'Backup data copied to clipboard.');
        else showModal('Backup (manual copy)', `<textarea readonly style="width:100%;height:100px;background:#1a1a2a;color:white;border:1px solid #ff5555;border-radius:1rem;padding:0.5rem;font-size:0.7rem;resize:none;">${jsonStr}</textarea><p style="margin-top:0.5rem;">Manual copy the text above.</p>`);
        playGamepadSound();
    });

    document.getElementById('revealSeedBtn').addEventListener('click', ()=>{
        if (!currentSeedphrase) { showModal('Error','Seedphrase not loaded.'); return; }
        showModal('🔐 Your Seedphrase', `<div style="background:#1a1a2a;border:1px solid #ff5555;border-radius:1rem;padding:1rem;font-family:monospace;color:#ffaaaa;word-break:break-all;text-align:left;">${currentSeedphrase}</div><p style="color:#ff8888;font-size:0.8rem;">⚠️ Never share this.</p>`);
        playGamepadSound();
    });

    // Navigation (unchanged)
    document.getElementById('menuBtn').addEventListener('click', ()=>{
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('active');
    });
    document.getElementById('menuOverlay').addEventListener('click', ()=>{
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('active');
    });

    document.getElementById('navHome').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('navTask').addEventListener('click', ()=> { showScreen('taskScreen'); renderTasks(); playGamepadSound(); });
    document.getElementById('navEcosystem').addEventListener('click', ()=> { showScreen('ecosystemScreen'); playGamepadSound(); });
    document.getElementById('navPreSale').addEventListener('click', ()=> { showScreen('preSaleScreen'); playGamepadSound(); });

    document.querySelector('[data-action="profile"]').addEventListener('click', ()=> { loadProfile(); showScreen('profileScreen'); playGamepadSound(); });
    document.querySelector('[data-action="whitepaper"]').addEventListener('click', ()=> {
        document.getElementById('whitepaperContent').innerHTML = `<h1>METAFOOT Whitepaper</h1><h2>The Football Metaverse Where Everyone Earns</h2><hr><h3>Executive Summary</h3><p>METAFOOT is a revolutionary football‑themed ecosystem that combines daily token mining, player training, team management, tournaments, and real‑world utility. The ecosystem is powered by the $FOOT token (total supply 500 million).</p><h3>Token Allocation</h3><table><tr><th>Allocation</th><th>%</th><th>Tokens</th></tr><tr><td>Airdrop</td><td>10%</td><td>50M</td></tr><tr><td>Pre‑sale</td><td>25%</td><td>125M</td></tr><tr><td>Team</td><td>15%</td><td>75M</td></tr><tr><td>Staking</td><td>15%</td><td>75M</td></tr><tr><td>Liquidity</td><td>10%</td><td>50M</td></tr><tr><td>Marketing</td><td>10%</td><td>50M</td></tr><tr><td>Treasury</td><td>15%</td><td>75M</td></tr></table><p>© METAFOOT</p>`;
        showScreen('whitepaperScreen'); playGamepadSound();
    });
    document.querySelector('[data-action="halving"]').addEventListener('click', ()=> {
        const t=[0,15000,100000,500000,1000000], r=[4,2,1,0.5,0.25];
        document.getElementById('halvingChartContainer').innerHTML = t.map((v,i)=>`<div class="chart-row"><div class="chart-label">${v===0?'0':(v>=1e6?'1M':(v>=1e3?(v/1e3).toFixed(0)+'k':v))}</div><div class="chart-bar-container"><div class="chart-bar" style="width:${(r[i]/4)*100}%;"></div></div><div class="chart-value">${r[i]} $FOOT</div></div>`).join('');
        showScreen('halvingScreen');
        playGamepadSound();
    });
    document.querySelector('[data-action="legal"]').addEventListener('click', ()=> { showScreen('legalScreen'); playGamepadSound(); });
    document.querySelector('[data-action="lock"]').addEventListener('click', ()=> {
        if(window._taskInterval) clearInterval(window._taskInterval);
        clearSession();
        currentAccountId = null;
        appContainer.style.display = 'none';
        authScreen.classList.remove('hidden');
        document.getElementById('loginAccountId').value = '';
        document.getElementById('loginError').innerText = '';
    });

    document.querySelectorAll('.info-card[data-screen]').forEach(card => {
        card.addEventListener('click', ()=> {
            const t = card.dataset.screen;
            if (t==='stake') showScreen('stakeScreen');
            else if (t==='pvp') showScreen('pvpScreen');
            else if (t==='tournaments') showScreen('tournamentsScreen');
            else if (t==='virtualCard') showScreen('virtualCardScreen');
            playGamepadSound();
        });
    });
    document.querySelectorAll('[id^="backFrom"]').forEach(b => b.addEventListener('click', ()=> { showScreen('ecosystemScreen'); playGamepadSound(); }));
    document.getElementById('backFromUpdatesBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('backFromLegalBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('stakeBackHomeBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('pvpBackHomeBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('tournamentsBackHomeBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('backFromPreSaleBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });
    document.getElementById('backFromHalvingBtn').addEventListener('click', ()=> { showScreen('miningScreen'); playGamepadSound(); });

    function renderTasks() {
        const now = Date.now(); const tgLast = parseInt(getStorage(TG_LAST_KEY))||0; const xLast = parseInt(getStorage(X_LAST_KEY))||0;
        const tgReady = (now - tgLast) >= COOLDOWN_MS; const xReady = (now - xLast) >= COOLDOWN_MS;
        const taskList = document.getElementById('dailyTasksList');
        taskList.innerHTML = `<li><span>📱 Visit Telegram Channel</span><button class="task-btn" id="telegramTaskBtn" ${tgReady?'':'disabled'}>${tgReady?'0.6 $FOOT':formatCooldown(tgLast)}</button></li><li><span>🐦 Visit X (Twitter)</span><button class="task-btn" id="xTaskBtn" ${xReady?'':'disabled'}>${xReady?'0.6 $FOOT':formatCooldown(xLast)}</button></li>`;
        function formatCooldown(last) { const remaining = COOLDOWN_MS - (now - last); const mins = Math.floor(remaining / 60000); const secs = Math.floor((remaining % 60000) / 1000); return `${mins}:${secs.toString().padStart(2,'0')}`; }
        document.getElementById('telegramTaskBtn')?.addEventListener('click', () => { if(!tgReady) return; window.open('https://t.me/metafoott','_blank'); setStorage(TG_LAST_KEY, now); addToUserBalance(0.6); updateMiningStats(); playGamepadSound(); renderTasks(); saveUserToCloud(); });
        document.getElementById('xTaskBtn')?.addEventListener('click', () => { if(!xReady) return; const start = Date.now(); window.location.href = 'twitter://user?screen_name=METAFOOTT'; setTimeout(()=>{ if(Date.now()-start<2000) window.open('https://x.com/METAFOOTT','_blank'); },500); setStorage(X_LAST_KEY, now); addToUserBalance(0.6); updateMiningStats(); playGamepadSound(); renderTasks(); saveUserToCloud(); });
        if(window._taskInterval) clearInterval(window._taskInterval); window._taskInterval = setInterval(renderTasks, 1000);
    }

    setInterval(refreshGlobalStats, 30000);
    setInterval(saveUserToCloud, 300000);
    refreshGlobalStats();

    const authScreen = document.getElementById('authScreen');
    const appContainer = document.getElementById('appContainer');
    const savedAccountId = loadSession();
    if (savedAccountId && localStorage.getItem(ENCRYPTED_SEED_KEY)) {
        currentAccountId = savedAccountId;
        currentPlayerPublicId = derivePlayerPublicId(savedAccountId);
        loadSeedphraseFromStorage();
        initApp(currentAccountId);
        authScreen.classList.add('hidden'); appContainer.style.display='block';
        document.getElementById('miningScreen').classList.remove('hidden');
    } else {
        authScreen.classList.remove('hidden'); appContainer.style.display='none';
    }
})();
</script>
</body>
</html>
